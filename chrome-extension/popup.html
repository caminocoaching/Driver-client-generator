<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: white;
    }

    .header {
      text-align: center;
      margin-bottom: 16px;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .header p {
      font-size: 12px;
      color: #888;
    }

    .status {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      text-align: center;
    }

    .status.facebook {
      background: linear-gradient(135deg, #1877f2 0%, #0d5bbd 100%);
    }

    .status.instagram {
      background: linear-gradient(135deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
    }

    .status.other {
      background: #333;
    }

    .status .platform {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .status .url {
      font-size: 11px;
      color: rgba(255,255,255,0.8);
      word-break: break-all;
      max-height: 40px;
      overflow: hidden;
    }

    .profile-name {
      background: rgba(255,255,255,0.1);
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 16px;
      text-align: center;
    }

    .profile-name label {
      font-size: 11px;
      color: #888;
      display: block;
      margin-bottom: 4px;
    }

    .profile-name .name {
      font-size: 16px;
      font-weight: 600;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #10b981;
      color: white;
    }

    .btn-primary:hover {
      background: #059669;
      transform: translateY(-1px);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.15);
      color: white;
      border: 1px solid rgba(255,255,255,0.3);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.25);
      transform: translateY(-1px);
    }

    .btn:disabled {
      background: #444;
      color: #888;
      cursor: not-allowed;
      transform: none;
    }

    .success {
      text-align: center;
      padding: 20px;
    }

    .success .checkmark {
      font-size: 48px;
      margin-bottom: 8px;
    }

    .success p {
      color: #10b981;
      font-weight: 600;
    }

    .error {
      background: rgba(239, 68, 68, 0.2);
      border: 1px solid #ef4444;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      color: #fca5a5;
      font-size: 13px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🏁 Antigravity</h1>
    <p>Driver Connect</p>
  </div>

  <div id="content">
    <div id="status" class="status other">
      <div class="platform">Detecting...</div>
      <div class="url"></div>
    </div>

    <div id="profile-section" class="profile-name hidden">
      <label>Profile Name Detected</label>
      <div class="name" id="profile-name">-</div>
    </div>

    <button id="open-app-btn" class="btn btn-primary" disabled style="margin-bottom: 8px;">
      💾 Save URL to App
    </button>

    <button id="copy-btn" class="btn btn-secondary" disabled>
      📋 Copy URL Only
    </button>
  </div>

  <div id="success" class="success hidden">
    <div class="checkmark">✅</div>
    <p id="success-msg">URL Copied!</p>
  </div>

  <div id="error" class="error hidden"></div>

  <div style="margin-top: 14px; padding: 10px; background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); border-radius: 8px; text-align: center;">
    <p style="font-size: 11px; color: #10b981; margin: 0;">
      💡 In Messenger or IG DMs, use the <strong>green floating button</strong> to open driver cards
    </p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
